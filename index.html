<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Personal | SECURETEC SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f1f5f9; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Fondo corporativo sutil */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1584985226164-32bce22896f4?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; opacity: 0.05; z-index: -1;
        }

        .id-card {
            background: white; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden; width: 100%; max-width: 380px;
        }

        .photo-frame {
            width: 140px; height: 140px; object-fit: cover;
            border-radius: 50%; border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #1e40af;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div id="search-container" class="w-full max-w-md mb-6 bg-white/90 backdrop-blur p-6 rounded-2xl shadow-xl">
        <h2 class="text-xl font-bold text-center text-gray-800 mb-4 uppercase tracking-tighter">Verificación SECURETEC</h2>
        <div class="flex gap-2">
            <input type="text" id="idInput" placeholder="Cédula del colaborador" class="w-full p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600 font-semibold text-gray-700">
            <button onclick="buscarColaborador()" class="bg-blue-800 text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-900 transition flex items-center gap-2">
                <span id="btn-text">Validar</span>
                <div id="loading-spinner" class="loader"></div>
            </button>
        </div>
    </div>

    <div id="card-result" class="id-card hidden">
        <div id="status-header" class="p-4 text-center text-white font-bold text-sm tracking-widest uppercase"></div>
        
        <div class="p-8">
            <div class="flex flex-col items-center mb-6">
                <img id="user_photo" src="" alt="Foto" class="photo-frame mb-4">
                <h1 id="user_name" class="text-2xl font-black text-gray-900 leading-tight text-center"></h1>
                <p id="user_role" class="text-blue-700 font-bold text-xs uppercase tracking-widest mt-1 text-center"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Documento</p>
                    <p id="user_id" class="font-bold text-gray-800 text-sm"></p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">RH</p>
                    <p id="user_rh" class="font-bold text-gray-800 text-sm"></p>
                </div>
                <div class="col-span-2">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Fecha de Verificación</p>
                    <p id="verification_time" class="font-bold text-gray-800 text-[13px]"></p>
                </div>
            </div>

            <div id="legal-message" class="text-[11px] leading-relaxed text-center p-4 rounded-lg"></div>
        </div>

        <div class="bg-gray-900 p-3 text-center">
            <span class="text-white text-[9px] font-bold tracking-[0.3em]">SECURETEC SAS - SEGURIDAD Y CONTROL</span>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN (REEMPLAZA ESTO CON TU ID REAL)
        const SHEET_ID = '1Q3_N1pBxLb56sA'; // <-- Asegúrate que este ID sea el correcto
        const SHEET_NAME = 'Hoja1';
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

        async function buscarColaborador() {
            const inputId = document.getElementById('idInput').value.trim();
            if (!inputId) return;

            toggleLoading(true);

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Corrección del error "data.find is not a function"
                if (!Array.isArray(data)) {
                    console.error("Respuesta de API inválida:", data);
                    alert("Error: No se pudo leer la base de datos. Verifica que el Google Sheet sea público.");
                    return;
                }

                // Búsqueda inteligente (limpia espacios y formatos)
                const user = data.find(row => {
                    const idSheet = String(row['Número de identificación'] || '').trim();
                    return idSheet === inputId;
                });

                if (user) {
                    mostrarResultado(user);
                } else {
                    mostrarNoEncontrado();
                }
            } catch (error) {
                alert("Error de conexión. Intente nuevamente.");
            } finally {
                toggleLoading(false);
            }
        }

        function toggleLoading(isLoading) {
            document.getElementById('btn-text').style.display = isLoading ? 'none' : 'block';
            document.getElementById('loading-spinner').style.display = isLoading ? 'block' : 'none';
        }

        function formatDriveUrl(url) {
            if (!url || url === "") return 'https://via.placeholder.com/150?text=SIN+FOTO';
            const idMatch = url.match(/[-\w]{25,}/);
            return idMatch ? `https://drive.google.com/uc?export=view&id=${idMatch[0]}` : url;
        }

        function mostrarResultado(user) {
            const card = document.getElementById('card-result');
            const header = document.getElementById('status-header');
            const messageBox = document.getElementById('legal-message');
            const now = new Date();
            const timeString = now.toLocaleDateString() + ' | ' + now.toLocaleTimeString();

            card.classList.remove('hidden');
            
            // Corrección de UNDEFINED (usa los nombres exactos de tus columnas)
            document.getElementById('user_name').innerText = (user['Nombre completo'] || 'No Registrado').toUpperCase();
            document.getElementById('user_role').innerText = (user['Cargo'] || 'Cargo no asignado').toUpperCase();
            document.getElementById('user_id').innerText = `${user['Tipo de identificación'] || ''} ${user['Número de identificación'] || ''}`;
            document.getElementById('user_rh').innerText = user['RH'] || '---';
            document.getElementById('user_photo').src = formatDriveUrl(user['URL_Foto']);
            document.getElementById('verification_time').innerText = timeString;

            const estado = String(user['Estado (Activo/Inactivo)'] || '').trim().toUpperCase();

            if (estado === 'ACTIVO') {
                header.innerText = "● COLABORADOR ACTIVO";
                header.className = "p-4 text-center text-white font-bold text-sm bg-green-600";
                messageBox.className = "text-[11px] leading-relaxed text-center p-4 rounded-lg bg-green-50 text-green-900 border border-green-100";
                messageBox.innerHTML = `
                    Este carnet es personal e intransferible. Acredita al titular como empleado de <strong>SECURETEC SAS NIT 900789617-5</strong>. 
                    <br><br>Si tiene alguna duda comunicarse a los teléfonos: <br><strong>604 322 2886</strong> o <strong>321 875 2308</strong>.
                `;
            } else {
                header.innerText = "X COLABORADOR INACTIVO";
                header.className = "p-4 text-center text-white font-bold text-sm bg-red-600";
                messageBox.className = "text-[11px] leading-relaxed text-center p-4 rounded-lg bg-red-50 text-red-900 border border-red-100";
                messageBox.innerHTML = `
                    <strong>ATENCIÓN:</strong> El colaborador se encuentra actualmente <strong>INACTIVO</strong>. 
                    <br><br>Si esto es un error, favor comunicarse con la oficina de <strong>Talento Humano</strong> a los teléfonos: <br><strong>604 322 2886</strong> o <strong>321 875 2308</strong>.
                `;
            }
        }

        function mostrarNoEncontrado() {
            const card = document.getElementById('card-result');
            const header = document.getElementById('status-header');
            const messageBox = document.getElementById('legal-message');
            
            card.classList.remove('hidden');
            header.innerText = "NO ENCONTRADO";
            header.className = "p-4 text-center text-white font-bold text-sm bg-gray-600";
            document.getElementById('user_photo').src = 'https://via.placeholder.com/150?text=X';
            document.getElementById('user_name').innerText = "DATOS NO EXISTENTES";
            document.getElementById('user_id').innerText = "Verifique el número";
            
            messageBox.className = "text-[11px] leading-relaxed text-center p-4 rounded-lg bg-gray-100 text-gray-700";
            messageBox.innerHTML = `El empleado no aparece en nuestra base de datos oficial. Favor comunicarse con <strong>Talento Humano</strong>: 604 322 2886 o 321 875 2308.`;
        }
    </script>
</body>
</html>
