<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Personal | SECURETEC SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f1f5f9; 
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1584985226164-32bce22896f4?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.05;
            z-index: -1;
        }

        .id-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .photo-frame {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e40af;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div id="search-container" class="w-full max-w-md mb-6 bg-white/90 backdrop-blur p-6 rounded-2xl shadow-xl border border-white">
        <h2 class="text-xl font-bold text-center text-gray-800 mb-4 uppercase tracking-tighter">Verificación SECURETEC</h2>
        <div class="flex gap-2">
            <input type="text" id="idInput" placeholder="Número de identificación" class="w-full p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600 font-semibold text-gray-700">
            <button onclick="buscarColaborador()" class="bg-blue-800 text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-900 transition flex items-center gap-2">
                <span id="btn-text">Validar</span>
                <div id="loading-spinner" class="loader"></div>
            </button>
        </div>
    </div>

    <div id="card-result" class="id-card w-full max-w-md hidden">
        <div id="status-header" class="p-4 text-center text-white font-bold text-sm tracking-widest uppercase"></div>
        
        <div class="p-8">
            <div class="flex flex-col items-center mb-6">
                <img id="user_photo" src="" alt="Foto" class="photo-frame mb-4">
                <h1 id="user_name" class="text-2xl font-black text-gray-900 leading-tight"></h1>
                <p id="user_role" class="text-blue-700 font-bold text-xs uppercase tracking-widest mt-1"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Documento</p>
                    <p id="user_id" class="font-bold text-gray-800"></p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">RH</p>
                    <p id="user_rh" class="font-bold text-gray-800"></p>
                </div>
                <div class="col-span-2">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Fecha de Verificación</p>
                    <p id="verification_time" class="font-bold text-gray-800 text-sm"></p>
                </div>
            </div>

            <div id="legal-message" class="text-[11px] leading-relaxed text-center p-4 rounded-lg"></div>
        </div>

        <div class="bg-gray-900 p-3 text-center">
            <span class="text-white text-[9px] font-bold tracking-[0.3em]">SECURETEC SAS - SEGURIDAD Y CONTROL</span>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN (Reemplaza con tu ID de Google Sheets)
        const SHEET_ID = '1Q3N814jMHK464840UrTOSq8_0SKujHu5N1pBxLb56sA'; 
        const SHEET_NAME = 'Hoja1';
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

        async function buscarColaborador() {
            const inputId = document.getElementById('idInput').value.trim();
            if (!inputId) return;

            toggleLoading(true);

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!Array.isArray(data)) throw new Error();

                const user = data.find(row => row['Número de identificación'] == inputId);

                if (user) {
                    mostrarResultado(user);
                } else {
                    mostrarErrorNoEncontrado();
                }
            } catch (error) {
                alert("Error de conexión con la base de datos.");
            } finally {
                toggleLoading(false);
            }
        }

        function toggleLoading(isLoading) {
            document.getElementById('btn-text').style.display = isLoading ? 'none' : 'block';
            document.getElementById('loading-spinner').style.display = isLoading ? 'block' : 'none';
        }

        function formatDriveUrl(url) {
            if (!url) return 'https://via.placeholder.com/150?text=SIN+FOTO';
            const idMatch = url.match(/[-\w]{25,}/);
            return idMatch ? `https://drive.google.com/uc?export=view&id=${idMatch[0]}` : url;
        }

        function mostrarResultado(user) {
            const card = document.getElementById('card-result');
            const header = document.getElementById('status-header');
            const messageBox = document.getElementById('legal-message');
            const now = new Date();
            const timeString = now.toLocaleDateString() + ' | ' + now.toLocaleTimeString();

            card.classList.remove('hidden');
            document.getElementById('user_name').innerText = user['Nombre completo'].toUpperCase();
            document.getElementById('user_role').innerText = user['Cargo'].toUpperCase();
            document.getElementById('user_id').innerText = `${user['Tipo de identificación']} ${user['Número de identificación']}`;
            document.getElementById('user_rh').innerText = user['RH'];
            document.getElementById('user_photo').src = formatDriveUrl(user['URL_Foto']);
            document.getElementById('verification_time').innerText = timeString;

            const estado = (user['Estado (Activo/Inactivo)'] || '').toUpperCase();

            if (estado.includes('ACTIVO') && !estado.includes('INACTIVO')) {
                header.innerText = "● COLABORADOR ACTIVO";
                header.className = "p-4 text-center text-white font-bold text-sm bg-green-600";
                messageBox.className = "text-[11px] leading-relaxed text-center p-4 rounded-lg bg-green-50 text-green-900 border border-green-100";
                messageBox.innerHTML = `
                    Este carnet es personal e intransferible. Acredita al titular como empleado de <strong>SECURETEC SAS NIT 900789617-5</strong>. 
                    <br><br>Si tiene alguna duda comunicarse a los teléfonos: <br><strong>604 322 2886</strong> o <strong>321 875 2308</strong>.
                `;
            } else {
                header.innerText = "X COLABORADOR INACTIVO";
                header.className = "p-4 text-center text-white font-bold text-sm bg-red-600";
                messageBox.className = "text-[11px] leading-relaxed text-center p-4 rounded-lg bg-red-50 text-red-900 border border-red-100";
                messageBox.innerHTML = `
                    <strong>ATENCIÓN:</strong> Este colaborador se encuentra actualmente <strong>INACTIVO</strong>. 
                    <br><br>Si considera que esto es un error, por favor comuníquese de inmediato a la oficina de <strong>Talento Humano</strong> a los teléfonos: <br><strong>604 322 2886</strong> o <strong>321 875 2308</strong>.
                `;
            }
        }

        function mostrarErrorNoEncontrado() {
            const card = document.getElementById('card-result');
            const header = document.getElementById('status-header');
            const messageBox = document.getElementById('legal-message');
            
            card.classList.remove('hidden');
            header.innerText = "USUARIO NO ENCONTRADO";
            header.className = "p-4 text-center text-white font-bold text-sm bg-gray-700";
            document.getElementById('user_photo').src = "https://via.placeholder.com/150?text=X";
            document.getElementById('user_name').innerText = "NO REGISTRADO";
            document.getElementById('user_role').innerText = "SIN CARGO";
            document.getElementById('user_id').innerText = "---";
            document.getElementById('user_rh').innerText = "---";
            document.getElementById('verification_time').innerText = "Acceso denegado";
            
            messageBox.className = "text-[11px] leading-relaxed text-center p-4 rounded-lg bg-gray-100 text-gray-700 border border-gray-200";
            messageBox.innerHTML = `
                El número de identificación ingresado no aparece en nuestra base de datos oficial. 
                <br><br>Si es un empleado activo, por favor comuníquese a la oficina de <strong>Talento Humano</strong>: <br><strong>604 322 2886</strong> o <strong>321 875 2308</strong>.
            `;
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id');
            if (idParam) {
                document.getElementById('idInput').value = idParam;
                buscarColaborador();
            }
        };
    </script>
</body>
</html>
