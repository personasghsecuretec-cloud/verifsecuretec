<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Personal | SECURETEC SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Tipografía y estructura base */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f8fafc; 
            position: relative;
            min-height: 100vh;
        }

        /* Fondo corporativo: Sistemas contra incendios (Opacidad muy baja) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Imagen de referencia de tuberías contra incendio */
            background-image: url('https://images.unsplash.com/photo-1584985226164-32bce22896f4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.04; /* Casi transparente */
            z-index: -1;
            pointer-events: none; /* Evita que el fondo interfiera con los clics */
        }

        /* Estilos del Carnet */
        .id-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-top: 10px solid #1e40af; /* Azul SECURETEC */
            position: relative;
            overflow: hidden;
        }

        .photo-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }

        .photo-frame {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #f1f5f9;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* Estados (Colores) */
        .status-active { color: #047857; background: #d1fae5; }
        .status-inactive { color: #b91c1c; background: #fee2e2; }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e40af;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div id="search-container" class="w-full max-w-md mb-8 bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Verificación de Identidad</h2>
        <div class="flex gap-2">
            <input type="text" id="idInput" placeholder="Número de identificación" class="w-full p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-600 bg-gray-50 text-gray-700 font-medium tracking-wide">
            <button onclick="buscarColaborador()" class="bg-blue-800 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-900 transition shadow-md flex items-center gap-2">
                <span id="btn-text">Verificar</span>
                <div id="loading-spinner" class="loader"></div>
            </button>
        </div>
    </div>

    <div id="card-result" class="id-card w-full max-w-sm hidden">
        <div class="p-8 flex flex-col items-center text-center">
            
            <div class="photo-container mb-6">
                <img id="user_photo" src="" alt="Foto del colaborador" class="photo-frame">
            </div>
            
            <h1 id="user_name" class="text-[22px] font-extrabold text-gray-900 leading-tight mb-1"></h1>
            <p id="user_role" class="text-blue-600 font-bold text-sm uppercase tracking-wider mb-6"></p>

            <div class="w-full grid grid-cols-2 gap-y-4 gap-x-2 text-left bg-gray-50 p-5 rounded-2xl border border-gray-100">
                <div>
                    <span class="block text-[11px] text-gray-400 font-bold tracking-wider mb-1">DOCUMENTO</span>
                    <span id="user_id" class="text-gray-800 font-bold text-sm"></span>
                </div>
                <div>
                    <span class="block text-[11px] text-gray-400 font-bold tracking-wider mb-1">TIPO SANGRE</span>
                    <span id="user_rh" class="text-gray-800 font-bold text-sm"></span>
                </div>
                <div class="col-span-2 flex flex-col items-center mt-2">
                    <span class="block text-[11px] text-gray-400 font-bold tracking-wider mb-2">ESTADO</span>
                    <span id="user_status" class="inline-block px-4 py-1.5 text-sm font-black rounded-full tracking-wide"></span>
                </div>
            </div>

            <p class="mt-8 text-[11px] text-gray-500 italic leading-relaxed px-2">
                Este carnet es personal e intransferible. Acredita al titular como empleado de <br><strong class="text-gray-700">SECURETEC SAS NIT 900789617-5</strong>.
            </p>
        </div>
        
        <div class="bg-blue-800 p-4 text-center">
            <span class="text-white text-[11px] font-bold tracking-[0.2em]">SISTEMA DE VERIFICACIÓN</span>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE GOOGLE SHEETS
        const SHEET_ID = '1Q3N814jMHK464840UrTOSq8_0SKujHu5N1pBxLb56sA'; // <-- RECUERDA PONER TU ID AQUÍ
        const SHEET_NAME = 'Hoja1'; 
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

        async function buscarColaborador() {
            const inputId = document.getElementById('idInput').value.trim();
            if (!inputId) return alert("Por favor ingrese un número de identificación válido");

            // UI de carga
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'block';
            document.getElementById('card-result').classList.add('hidden');

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error("No se pudo conectar con la base de datos.");
                }

                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    throw new Error("El formato de la base de datos no es válido.");
                }

                // BUSQUEDA EXACTA por la columna "Número de identificación"
                const user = data.find(row => row['Número de identificación'] == inputId);

                if (user) {
                    mostrarCarnet(user);
                } else {
                    alert("No se encontró ningún colaborador con ese número de identificación.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Error de conexión: Verifica que tu Google Sheet esté compartido como 'Cualquier persona con el enlace'.");
            } finally {
                // Restaurar UI del botón
                document.getElementById('btn-text').style.display = 'block';
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        function formatDriveUrl(url) {
            if (!url) return 'https://via.placeholder.com/150?text=Sin+Foto'; // Imagen por defecto si la celda está vacía
            if (url.includes('drive.google.com')) {
                const idMatch = url.match(/[-\w]{25,}/); // Extrae el ID del enlace de Drive con precisión
                if (idMatch) {
                    return `https://drive.google.com/uc?export=view&id=${idMatch[0]}`;
                }
            }
            return url;
        }

        function mostrarCarnet(user) {
            document.getElementById('card-result').classList.remove('hidden');
            
            // Extracción segura de datos utilizando los encabezados exactos de tu Excel
            const nombreCompleto = user['Nombre completo'] || 'No registrado';
            const cargo = user['Cargo'] || 'No registrado';
            const tipoId = user['Tipo de identificación'] || '';
            const numId = user['Número de identificación'] || '';
            const rh = user['RH'] || 'N/A';
            const urlFoto = user['URL_Foto'] || '';
            const estadoBruto = user['Estado (Activo/Inactivo)'] || '';

            // Asignación de datos al HTML
            document.getElementById('user_name').innerText = nombreCompleto.toUpperCase();
            document.getElementById('user_role').innerText = cargo.toUpperCase();
            document.getElementById('user_id').innerText = `${tipoId} ${numId}`;
            document.getElementById('user_rh').innerText = rh.toUpperCase();
            document.getElementById('user_photo').src = formatDriveUrl(urlFoto);
            
            // Lógica de color para el estado
            const statusBadge = document.getElementById('user_status');
            const estadoLimpio = estadoBruto.trim().toUpperCase();
            statusBadge.innerText = estadoLimpio || 'SIN ESTADO';
            
            if (estadoLimpio.includes('ACTIVO') && !estadoLimpio.includes('INACTIVO')) {
                statusBadge.className = 'status-active shadow-sm';
            } else {
                statusBadge.className = 'status-inactive shadow-sm';
            }
        }

        // Auto-búsqueda si se escanea un QR con el ID en la URL (?id=123)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id');
            if (idParam) {
                document.getElementById('idInput').value = idParam;
                buscarColaborador();
            }
        };
    </script>
</body>
</html>
